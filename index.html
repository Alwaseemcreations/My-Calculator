<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  :root{
    --accent:#ff9f0a;
    --accent-contrast:#241300;
    --scale:1;
    --key-radius:50%;
    --zero-radius:38px;
  }
  [data-theme="dark"]{
    --bg-top:#2c2c2e; --bg-mid:#1c1c1e; --bg-bottom:#0a0a0b;
    --panel:#161618; --calc-top:#232325; --calc-bottom:#141416;
    --display-fade:#8e8e93; --key-num:#2c2c2e; --key-fn:#a5a5a5;
    --text-light:#f5f5f7; --text-dark:#1c1c1e;
    --border-soft:rgba(255,255,255,0.06); --hist-hover:rgba(255,255,255,0.06);
    --time-color:#5f5f63;
  }
  [data-theme="light"]{
    --bg-top:#eef0f3; --bg-mid:#e2e5ea; --bg-bottom:#d3d7dd;
    --panel:#ffffff; --calc-top:#fbfbfc; --calc-bottom:#e9eaed;
    --display-fade:#6b6b70; --key-num:#ffffff; --key-fn:#d1d3d8;
    --text-light:#1c1c1e; --text-dark:#1c1c1e;
    --border-soft:rgba(0,0,0,0.06); --hist-hover:rgba(0,0,0,0.05);
    --time-color:#9a9a9e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
    background:radial-gradient(circle at 50% -10%, var(--bg-top) 0%, var(--bg-mid) 35%, var(--bg-bottom) 100%);
    color:var(--text-light);
    min-height:100vh;
    display:flex; justify-content:center;
    padding:24px 14px 40px;
    transition:background 0.3s ease, color 0.3s ease;
  }
  .app{ width:100%; max-width:380px; display:flex; flex-direction:column; gap:18px; }
  .app-header{ position:relative; display:flex; flex-direction:column; align-items:center; padding:4px 44px 14px; }
  .brand-title{
    font-family:'Georgia','Times New Roman',serif;
    font-weight:800;
    font-size:clamp(1.3rem, 6.5vw, 1.9rem);
    letter-spacing:2px;
    text-transform:uppercase;
    text-align:center;
    background:linear-gradient(135deg, var(--accent) 0%, var(--text-light) 55%, var(--accent) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 2px 14px rgba(0,0,0,0.25);
    line-height:1.25;
  }
  .brand-underline{
    margin-top:8px;
    width:64px;
    height:3px;
    border-radius:2px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .icon-btn{
    position:absolute; top:2px; right:0;
    background:var(--panel); border:1px solid var(--border-soft); color:var(--text-light);
    width:40px; height:40px; border-radius:14px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,0.15);
    transition:filter 0.15s ease, transform 0.08s ease;
  }
  .icon-btn:hover{ filter:brightness(1.1); }
  .icon-btn:active{ transform:scale(0.92); }
  .icon-btn svg{ width:20px; height:20px; }

  .calc{
    background:linear-gradient(180deg, var(--calc-top) 0%, var(--calc-bottom) 100%);
    border-radius:32px; padding:22px 18px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    border:1px solid var(--border-soft);
    transition:background 0.3s ease;
  }
  .display{
    padding:18px 10px 10px; text-align:right; min-height:104px;
    display:flex; flex-direction:column; justify-content:flex-end; gap:6px;
    word-break:break-all;
  }
  .display .expression{
    font-size:calc(1rem * var(--scale)); color:var(--display-fade);
    min-height:20px; letter-spacing:0.3px;
  }
  .display .current{
    font-size:calc(clamp(1.8rem, 9vw, 3rem) * var(--scale));
    font-weight:500; line-height:1.1; letter-spacing:0.5px;
  }
  .keys{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-top:8px;
  }
  button.key{
    border:none; outline:none; font-size:calc(1.4rem * var(--scale));
    font-weight:500; padding:0; aspect-ratio:1/1; border-radius:var(--key-radius);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform 0.08s ease, filter 0.15s ease, background 0.15s ease, border-radius 0.2s ease;
    color:var(--text-light); background:var(--key-num); user-select:none;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
  }
  button.key:active{ transform:scale(0.92); }
  button.key:hover{ filter:brightness(1.15); }
  .key.fn{ background:var(--key-fn); color:var(--text-dark); }
  .key.op{ background:var(--accent); color:var(--accent-contrast); font-weight:600; }
  .key.op.active-op{ background:var(--text-light); color:var(--accent); }
  [data-theme="light"] .key.op.active-op{ background:var(--text-dark); color:var(--accent); }
  .key.zero{
    grid-column:span 2; aspect-ratio:auto; border-radius:var(--zero-radius);
    justify-content:flex-start; padding-left:28px;
  }

  .history-panel{
    background:var(--panel); border-radius:24px; padding:16px 16px 10px;
    border:1px solid var(--border-soft); box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition:background 0.3s ease;
  }
  .history-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .history-header h2{
    font-size:0.95rem; text-transform:uppercase; letter-spacing:1px;
    color:var(--display-fade); margin:0; font-weight:600;
  }
  .clear-history-btn{
    background:none; border:1px solid var(--border-soft); color:#ff6961;
    font-size:0.8rem; padding:6px 12px; border-radius:14px; cursor:pointer;
    transition:background 0.15s ease;
  }
  .clear-history-btn:hover{ background:rgba(255,105,97,0.12); }
  .history-list{ max-height:260px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
  .history-list::-webkit-scrollbar{ width:6px; }
  .history-list::-webkit-scrollbar-thumb{ background:var(--display-fade); border-radius:10px; opacity:0.4; }
  .history-empty{ color:var(--display-fade); font-size:0.9rem; text-align:center; padding:20px 0 24px; }
  .history-item{ display:flex; flex-direction:column; padding:10px 10px; border-radius:12px; cursor:pointer; transition:background 0.15s ease; }
  .history-item:hover{ background:var(--hist-hover); }
  .history-item .expr{ font-size:0.85rem; color:var(--display-fade); }
  .history-item .res{ font-size:1.15rem; font-weight:600; color:var(--text-light); }
  .history-item .time{ font-size:0.7rem; color:var(--time-color); margin-top:2px; }
  .history-row{ display:flex; justify-content:space-between; align-items:baseline; }

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.2s ease; z-index:50; padding:20px;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }
  .settings-panel{
    background:var(--panel); color:var(--text-light); border-radius:24px; padding:22px;
    width:100%; max-width:340px; border:1px solid var(--border-soft);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    transform:translateY(12px); transition:transform 0.2s ease;
  }
  .overlay.open .settings-panel{ transform:translateY(0); }
  .settings-panel h3{ margin:0 0 18px; font-size:1.1rem; }
  .settings-group{ margin-bottom:20px; }
  .settings-group label.group-label{
    display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.8px;
    color:var(--display-fade); margin-bottom:10px; font-weight:600;
  }
  .swatches{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .swatch{ width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.1s ease, border-color 0.15s ease; }
  .swatch:hover{ transform:scale(1.08); }
  .swatch.selected{ border-color:var(--text-light); }
  .swatch.custom-swatch{ display:flex; align-items:center; justify-content:center; background:conic-gradient(red, yellow, lime, cyan, blue, magenta, red); position:relative; overflow:hidden; }
  .swatch.custom-swatch input[type="color"]{ position:absolute; inset:0; opacity:0; cursor:pointer; border:none; padding:0; }
  .segmented{ display:flex; background:var(--key-fn); border-radius:14px; padding:4px; gap:4px; }
  [data-theme="dark"] .segmented{ background:#2c2c2e; }
  .segmented button{ flex:1; border:none; background:transparent; color:var(--text-light); padding:8px 6px; border-radius:10px; font-size:0.85rem; cursor:pointer; transition:background 0.15s ease, color 0.15s ease; }
  .segmented button.active{ background:var(--accent); color:var(--accent-contrast); font-weight:600; }
  .slider-row{ display:flex; align-items:center; gap:10px; }
  .slider-row span{ font-size:0.85rem; color:var(--display-fade); width:34px; text-align:center; }
  input[type="range"]{ flex:1; -webkit-appearance:none; height:4px; border-radius:2px; background:var(--key-fn); outline:none; }
  input[type="range"]::-webkit-slider-thumb{ -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.3); }
  input[type="range"]::-moz-range-thumb{ width:20px; height:20px; border-radius:50%; background:var(--accent); border:none; cursor:pointer; }
  .settings-close{ width:100%; padding:12px; border:none; border-radius:14px; background:var(--accent); color:var(--accent-contrast); font-weight:600; font-size:0.95rem; cursor:pointer; margin-top:6px; }
  .settings-close:hover{ filter:brightness(1.08); }

  @media (max-width:360px){
    button.key{ font-size:calc(1.2rem * var(--scale)); }
    .key.zero{ padding-left:22px; }
  }
</style>
</head>
<body data-theme="dark">

<div class="app">
  <div class="app-header">
    <div class="brand-title" id="brandTitle">AL WASEEM CALCULATOR</div>
    <div class="brand-underline"></div>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="calc">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="keys">
      <button class="key fn" data-action="clear">AC</button>
      <button class="key fn" data-action="lparen">(</button>
      <button class="key fn" data-action="rparen">)</button>
      <button class="key fn" data-action="backspace">⌫</button>

      <button class="key fn" data-action="negate">+/-</button>
      <button class="key fn" data-action="percent">%</button>
      <button class="key fn" data-action="sqrt">√</button>
      <button class="key op" data-op="÷">÷</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key op" data-op="×">×</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key op" data-op="-">−</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key zero" data-num="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key op" data-action="equals">=</button>
    </div>
  </div>

  <div class="history-panel">
    <div class="history-header">
      <h2>History</h2>
      <button class="clear-history-btn" id="clearHistoryBtn">Clear History</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">No calculations yet</div>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>Personalize</h3>
    <div class="settings-group">
      <label class="group-label">App Name</label>
      <input type="text" id="titleInput" maxlength="30" placeholder="AL WASEEM CALCULATOR"
        style="width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border-soft); background:var(--key-num); color:var(--text-light); font-size:0.95rem; font-weight:600; letter-spacing:0.5px;">
    </div>
    <div class="settings-group">
      <label class="group-label">Appearance</label>
      <div class="segmented" id="themeSeg">
        <button data-value="dark" class="active">Dark</button>
        <button data-value="light">Light</button>
      </div>
    </div>
    <div class="settings-group">
      <label class="group-label">Accent Color</label>
      <div class="swatches" id="accentSwatches">
        <div class="swatch selected" data-color="#ff9f0a" style="background:#ff9f0a"></div>
        <div class="swatch" data-color="#0a84ff" style="background:#0a84ff"></div>
        <div class="swatch" data-color="#30d158" style="background:#30d158"></div>
        <div class="swatch" data-color="#ff375f" style="background:#ff375f"></div>
        <div class="swatch" data-color="#bf5af2" style="background:#bf5af2"></div>
        <div class="swatch" data-color="#64d2ff" style="background:#64d2ff"></div>
        <div class="swatch custom-swatch" title="Custom color">
          <input type="color" id="customColorInput" value="#ff9f0a">
        </div>
      </div>
    </div>
    <div class="settings-group">
      <label class="group-label">Button Shape</label>
      <div class="segmented" id="shapeSeg">
        <button data-value="round" class="active">Round</button>
        <button data-value="square">Square</button>
      </div>
    </div>
    <div class="settings-group">
      <label class="group-label">Display Size</label>
      <div class="slider-row">
        <span>S</span>
        <input type="range" id="sizeSlider" min="0.85" max="1.25" step="0.05" value="1">
        <span>L</span>
      </div>
    </div>
    <button class="settings-close" id="closeSettings">Done</button>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'calc_history_v1';
  const SETTINGS_KEY = 'calc_settings_v1';
  const MAX_HISTORY = 50;

  const expressionEl = document.getElementById('expression');
  const currentEl = document.getElementById('current');
  const historyList = document.getElementById('historyList');
  const historyEmpty = document.getElementById('historyEmpty');
  const clearHistoryBtn = document.getElementById('clearHistoryBtn');

  let expr = '';           // the full expression as typed, e.g. "12+3×(4-2)"
  let frozenLabel = null;  // label shown after "=", e.g. "12+3 = 15"
  let justEvaluated = false;

  /* ---------- History ---------- */
  function loadHistory(){
    try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
    catch(e){ return []; }
  }
  function saveHistory(list){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }catch(e){}
  }
  let history = loadHistory();

  /* ---------- Settings ---------- */
  const defaultSettings = { theme:'dark', accent:'#ff9f0a', shape:'round', scale:1, title:'AL WASEEM CALCULATOR' };
  function loadSettings(){
    try{
      const raw = localStorage.getItem(SETTINGS_KEY);
      return raw ? Object.assign({}, defaultSettings, JSON.parse(raw)) : { ...defaultSettings };
    }catch(e){ return { ...defaultSettings }; }
  }
  function saveSettings(s){ try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }catch(e){} }
  let settings = loadSettings();

  function hexToRgb(hex){ const m = hex.replace('#','').match(/.{1,2}/g); return m.map(x => parseInt(x, 16)); }
  function pickContrastColor(hex){
    const [r,g,b] = hexToRgb(hex);
    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
    return luminance > 0.6 ? '#241300' : '#ffffff';
  }

  function applySettings(){
    document.body.setAttribute('data-theme', settings.theme);
    document.documentElement.style.setProperty('--accent', settings.accent);
    document.documentElement.style.setProperty('--accent-contrast', pickContrastColor(settings.accent));
    document.documentElement.style.setProperty('--scale', settings.scale);
    if(settings.shape === 'square'){
      document.documentElement.style.setProperty('--key-radius', '20px');
      document.documentElement.style.setProperty('--zero-radius', '20px');
    } else {
      document.documentElement.style.setProperty('--key-radius', '50%');
      document.documentElement.style.setProperty('--zero-radius', '38px');
    }
    document.querySelectorAll('#themeSeg button').forEach(b => b.classList.toggle('active', b.dataset.value === settings.theme));
    document.querySelectorAll('#shapeSeg button').forEach(b => b.classList.toggle('active', b.dataset.value === settings.shape));
    document.querySelectorAll('.swatch[data-color]').forEach(sw => sw.classList.toggle('selected', sw.dataset.color.toLowerCase() === settings.accent.toLowerCase()));
    document.getElementById('sizeSlider').value = settings.scale;
    document.getElementById('customColorInput').value = settings.accent;
    document.getElementById('brandTitle').textContent = settings.title || 'AL WASEEM CALCULATOR';
    const titleInput = document.getElementById('titleInput');
    if(document.activeElement !== titleInput) titleInput.value = settings.title || '';
  }

  document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('settingsOverlay').classList.add('open');
  });
  document.getElementById('closeSettings').addEventListener('click', closeSettingsPanel);
  document.getElementById('settingsOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'settingsOverlay') closeSettingsPanel();
  });
  function closeSettingsPanel(){ document.getElementById('settingsOverlay').classList.remove('open'); }

  document.querySelectorAll('#themeSeg button').forEach(btn => {
    btn.addEventListener('click', () => { settings.theme = btn.dataset.value; saveSettings(settings); applySettings(); });
  });
  document.querySelectorAll('#shapeSeg button').forEach(btn => {
    btn.addEventListener('click', () => { settings.shape = btn.dataset.value; saveSettings(settings); applySettings(); });
  });
  document.querySelectorAll('.swatch[data-color]').forEach(sw => {
    sw.addEventListener('click', () => { settings.accent = sw.dataset.color; saveSettings(settings); applySettings(); });
  });
  document.getElementById('customColorInput').addEventListener('input', (e) => {
    settings.accent = e.target.value; saveSettings(settings); applySettings();
  });
  document.getElementById('sizeSlider').addEventListener('input', (e) => {
    settings.scale = parseFloat(e.target.value); saveSettings(settings); applySettings();
  });
  document.getElementById('titleInput').addEventListener('input', (e) => {
    settings.title = e.target.value.toUpperCase();
    saveSettings(settings);
    document.getElementById('brandTitle').textContent = settings.title || 'AL WASEEM CALCULATOR';
  });
  document.getElementById('titleInput').addEventListener('blur', () => {
    if(!settings.title){ settings.title = 'AL WASEEM CALCULATOR'; }
    saveSettings(settings);
    applySettings();
  });

  applySettings();

  /* ---------- Number formatting ---------- */
  function formatNumber(numStr){
    if(numStr === 'Error') return numStr;
    const num = parseFloat(numStr);
    if(Number.isNaN(num)) return '0';
    if(Math.abs(num) >= 1e15 || (Math.abs(num) < 1e-9 && num !== 0)){
      return num.toExponential(6);
    }
    const parts = numStr.split('.');
    const intPart = parts[0].replace(/^-/, '');
    const sign = numStr.startsWith('-') ? '-' : '';
    const withCommas = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return sign + withCommas + (parts[1] !== undefined ? '.' + parts[1] : '');
  }
  function roundResult(n){
    if(!isFinite(n)) return n;
    return Math.round((n + Number.EPSILON) * 1e10) / 1e10;
  }

  /* ---------- Tokenizer + recursive-descent parser (supports + - × ÷ () √ %) ---------- */
  function tokenize(str){
    const tokens = [];
    let i = 0;
    while(i < str.length){
      const c = str[i];
      if(/[0-9.]/.test(c)){
        let j = i;
        while(j < str.length && /[0-9.]/.test(str[j])) j++;
        tokens.push({ type:'num', value: str.slice(i, j) });
        i = j; continue;
      }
      if(c === '√'){ tokens.push({ type:'sqrt' }); i++; continue; }
      if(c === '('){ tokens.push({ type:'lparen' }); i++; continue; }
      if(c === ')'){ tokens.push({ type:'rparen' }); i++; continue; }
      if(c === '%'){ tokens.push({ type:'percent' }); i++; continue; }
      if(c === '×' || c === '*'){ tokens.push({ type:'op', value:'*' }); i++; continue; }
      if(c === '÷' || c === '/'){ tokens.push({ type:'op', value:'/' }); i++; continue; }
      if(c === '+'){ tokens.push({ type:'op', value:'+' }); i++; continue; }
      if(c === '-' || c === '−'){ tokens.push({ type:'op', value:'-' }); i++; continue; }
      i++; // skip unknown characters
    }
    return tokens;
  }

  function evaluateExpr(str){
    let s = str;
    const open = (s.match(/\(/g) || []).length;
    const close = (s.match(/\)/g) || []).length;
    if(open > close) s += ')'.repeat(open - close);

    const tokens = tokenize(s);
    if(tokens.length === 0) throw new Error('empty');
    let pos = 0;
    const peek = () => tokens[pos];
    const consume = () => tokens[pos++];

    function parseExpression(){
      let value = parseTerm();
      while(peek() && peek().type === 'op' && (peek().value === '+' || peek().value === '-')){
        const op = consume().value;
        const rhs = parseTerm();
        value = op === '+' ? value + rhs : value - rhs;
      }
      return value;
    }
    function parseTerm(){
      let value = parseFactor();
      while(peek() && peek().type === 'op' && (peek().value === '*' || peek().value === '/')){
        const op = consume().value;
        const rhs = parseFactor();
        if(op === '/'){
          if(rhs === 0) throw new Error('div0');
          value = value / rhs;
        } else value *= rhs;
      }
      return value;
    }
    function parseFactor(){
      if(peek() && peek().type === 'op' && peek().value === '-'){
        consume();
        return -parseFactor();
      }
      let value = parsePrimary();
      while(peek() && peek().type === 'percent'){
        consume();
        value = value / 100;
      }
      return value;
    }
    function parsePrimary(){
      const t = peek();
      if(!t) throw new Error('unexpected end');
      if(t.type === 'num'){ consume(); return parseFloat(t.value); }
      if(t.type === 'lparen'){
        consume();
        const value = parseExpression();
        if(peek() && peek().type === 'rparen') consume();
        return value;
      }
      if(t.type === 'sqrt'){
        consume();
        let value;
        if(peek() && peek().type === 'lparen'){
          consume();
          value = parseExpression();
          if(peek() && peek().type === 'rparen') consume();
        } else {
          value = parsePrimary();
        }
        if(value < 0) throw new Error('negative sqrt');
        return Math.sqrt(value);
      }
      throw new Error('unexpected token');
    }

    const result = parseExpression();
    if(pos !== tokens.length) throw new Error('trailing tokens');
    return result;
  }

  /* ---------- Display ---------- */
  function updateDisplay(){
    currentEl.textContent = expr === '' ? '0' : expr;
    if(frozenLabel !== null){
      expressionEl.textContent = frozenLabel;
      return;
    }
    let preview = '';
    if(expr && /[0-9)%]$/.test(expr)){
      try{
        const val = evaluateExpr(expr);
        if(isFinite(val) && !isNaN(val)){
          const rounded = roundResult(val);
          if(String(rounded) !== expr){
            preview = '= ' + formatNumber(String(rounded));
          }
        }
      }catch(e){ preview = ''; }
    }
    expressionEl.textContent = preview;
  }

  function lastChar(){ return expr.length ? expr[expr.length - 1] : ''; }

  function inputDigit(d){
    frozenLabel = null;
    if(justEvaluated){ expr = d; justEvaluated = false; }
    else if(expr === '0'){ expr = d; }
    else { expr += d; }
    updateDisplay();
  }

  function inputDecimal(){
    frozenLabel = null;
    if(justEvaluated){ expr = '0.'; justEvaluated = false; updateDisplay(); return; }
    const m = expr.match(/([0-9]*\.?[0-9]*)$/);
    const seg = m ? m[0] : '';
    if(seg.includes('.')) return;
    expr += (seg === '' ? '0.' : '.');
    updateDisplay();
  }

  function chooseOperator(op){
    frozenLabel = null;
    if(expr === ''){
      if(op === '-'){ expr = '-'; }
      justEvaluated = false;
      updateDisplay();
      return;
    }
    justEvaluated = false;
    const lc = lastChar();
    if('+-×÷'.includes(lc)){
      expr = expr.slice(0, -1) + op;
    } else if(lc === '('){
      if(op === '-') expr += op;
    } else {
      expr += op;
    }
    updateDisplay();
  }

  function inputParen(kind){
    frozenLabel = null;
    if(kind === 'l'){
      if(justEvaluated){ expr = '('; justEvaluated = false; updateDisplay(); return; }
      const lc = lastChar();
      if(/[0-9)%]/.test(lc)){ expr += '×('; }
      else { expr += '('; }
    } else {
      const openCount = (expr.match(/\(/g) || []).length;
      const closeCount = (expr.match(/\)/g) || []).length;
      const lc = lastChar();
      if(openCount > closeCount && /[0-9)%]/.test(lc)){ expr += ')'; }
    }
    updateDisplay();
  }

  function inputSqrt(){
    frozenLabel = null;
    justEvaluated = false;
    const lc = lastChar();
    if(/[0-9)%]/.test(lc)){ expr += '×√('; }
    else { expr += '√('; }
    updateDisplay();
  }

  function inputPercent(){
    frozenLabel = null;
    const lc = lastChar();
    if(/[0-9)]/.test(lc)){ expr += '%'; }
    updateDisplay();
  }

  function negate(){
    frozenLabel = null;
    if(expr === '' || justEvaluated){
      expr = justEvaluated ? '-' + expr : '-';
      justEvaluated = false;
      updateDisplay();
      return;
    }
    const m = expr.match(/(\d+\.?\d*)$/);
    if(m){
      const num = m[0];
      const start = expr.length - num.length;
      const before = expr.slice(0, start);
      if(before.endsWith('(-') && (start - 2 === 0 || /[+\-×÷(]/.test(expr[start - 3] || ''))){
        expr = before.slice(0, -2) + num;
      } else {
        expr = before + '(-' + num + ')';
      }
    } else if(/[+\-×÷(]$/.test(expr)){
      expr += '-';
    }
    updateDisplay();
  }

  function backspace(){
    frozenLabel = null;
    if(justEvaluated){ expr = ''; justEvaluated = false; updateDisplay(); return; }
    if(expr.length <= 1){ expr = ''; }
    else {
      // remove a trailing function marker like "√(" or "×(" as one unit
      if(expr.endsWith('√(')){ expr = expr.slice(0, -2); }
      else { expr = expr.slice(0, -1); }
    }
    updateDisplay();
  }

  function clearAll(){
    expr = ''; frozenLabel = null; justEvaluated = false;
    updateDisplay();
  }

  function equals(){
    if(expr === '') return;
    let result;
    try{
      result = evaluateExpr(expr);
      if(!isFinite(result) || isNaN(result)) throw new Error('bad result');
    }catch(e){
      frozenLabel = expr + ' =';
      currentEl.textContent = 'Error';
      expressionEl.textContent = frozenLabel;
      justEvaluated = true;
      expr = '';
      return;
    }
    const rounded = roundResult(result);
    const resultStr = String(rounded);
    addHistory(expr, formatNumber(resultStr));
    frozenLabel = expr + ' =';
    expr = resultStr;
    justEvaluated = true;
    updateDisplay();
  }

  /* ---------- History rendering ---------- */
  function addHistory(exprText, result){
    const entry = { expr: exprText, result, time: new Date().toISOString() };
    history.unshift(entry);
    if(history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    saveHistory(history);
    renderHistory();
  }

  function formatTimestamp(iso){
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const timeStr = d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    if(sameDay) return timeStr;
    return `${d.toLocaleDateString([], { month:'short', day:'numeric' })}, ${timeStr}`;
  }

  function renderHistory(){
    historyList.querySelectorAll('.history-item').forEach(el => el.remove());
    if(history.length === 0){ historyEmpty.style.display = 'block'; return; }
    historyEmpty.style.display = 'none';
    history.forEach((entry) => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-row">
          <span class="expr">${entry.expr} =</span>
          <span class="time">${formatTimestamp(entry.time)}</span>
        </div>
        <span class="res">${entry.result}</span>
      `;
      item.addEventListener('click', () => {
        expr = entry.result.replace(/,/g, '');
        justEvaluated = true;
        frozenLabel = `${entry.expr} =`;
        updateDisplay();
      });
      historyList.appendChild(item);
    });
  }

  clearHistoryBtn.addEventListener('click', () => {
    if(history.length === 0) return;
    if(confirm('Clear all calculation history? This cannot be undone.')){
      history = [];
      saveHistory(history);
      renderHistory();
    }
  });

  /* ---------- Button wiring ---------- */
  document.querySelectorAll('[data-num]').forEach(btn => {
    btn.addEventListener('click', () => inputDigit(btn.getAttribute('data-num')));
  });
  document.querySelectorAll('[data-op]').forEach(btn => {
    btn.addEventListener('click', () => chooseOperator(btn.getAttribute('data-op')));
  });
  document.querySelector('[data-action="decimal"]').addEventListener('click', inputDecimal);
  document.querySelector('[data-action="clear"]').addEventListener('click', clearAll);
  document.querySelector('[data-action="negate"]').addEventListener('click', negate);
  document.querySelector('[data-action="percent"]').addEventListener('click', inputPercent);
  document.querySelector('[data-action="sqrt"]').addEventListener('click', inputSqrt);
  document.querySelector('[data-action="lparen"]').addEventListener('click', () => inputParen('l'));
  document.querySelector('[data-action="rparen"]').addEventListener('click', () => inputParen('r'));
  document.querySelector('[data-action="backspace"]').addEventListener('click', backspace);
  document.querySelector('[data-action="equals"]').addEventListener('click', equals);

  window.addEventListener('keydown', (e) => {
    if(e.key >= '0' && e.key <= '9'){ inputDigit(e.key); return; }
    if(e.key === '.'){ inputDecimal(); return; }
    if(e.key === '+' ){ chooseOperator('+'); return; }
    if(e.key === '-' ){ chooseOperator('-'); return; }
    if(e.key === '*' ){ chooseOperator('×'); return; }
    if(e.key === '/' ){ e.preventDefault(); chooseOperator('÷'); return; }
    if(e.key === '('){ inputParen('l'); return; }
    if(e.key === ')'){ inputParen('r'); return; }
    if(e.key === '%'){ inputPercent(); return; }
    if(e.key === 'Enter' || e.key === '='){ e.preventDefault(); equals(); return; }
    if(e.key === 'Backspace'){ backspace(); return; }
    if(e.key === 'Escape'){ clearAll(); return; }
  });

  renderHistory();
  updateDisplay();
})();
</script>

</body>
</html>
