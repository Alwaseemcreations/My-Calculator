<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  :root{
    --accent:#ff9f0a;
    --accent-contrast:#241300;
    --scale:1;
    --key-radius:50%;
    --zero-radius:38px;
  }
  [data-theme="dark"]{
    --bg-top:#2c2c2e;
    --bg-mid:#1c1c1e;
    --bg-bottom:#0a0a0b;
    --panel:#161618;
    --calc-top:#232325;
    --calc-bottom:#141416;
    --display-fade:#8e8e93;
    --key-num:#2c2c2e;
    --key-fn:#a5a5a5;
    --text-light:#f5f5f7;
    --text-dark:#1c1c1e;
    --border-soft:rgba(255,255,255,0.06);
    --hist-hover:rgba(255,255,255,0.06);
    --time-color:#5f5f63;
  }
  [data-theme="light"]{
    --bg-top:#eef0f3;
    --bg-mid:#e2e5ea;
    --bg-bottom:#d3d7dd;
    --panel:#ffffff;
    --calc-top:#fbfbfc;
    --calc-bottom:#e9eaed;
    --display-fade:#6b6b70;
    --key-num:#ffffff;
    --key-fn:#d1d3d8;
    --text-light:#1c1c1e;
    --text-dark:#1c1c1e;
    --border-soft:rgba(0,0,0,0.06);
    --hist-hover:rgba(0,0,0,0.05);
    --time-color:#9a9a9e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
    background:radial-gradient(circle at 50% -10%, var(--bg-top) 0%, var(--bg-mid) 35%, var(--bg-bottom) 100%);
    color:var(--text-light);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 14px 40px;
    transition:background 0.3s ease, color 0.3s ease;
  }
  .app{ width:100%; max-width:380px; display:flex; flex-direction:column; gap:18px; }

  .top-row{ display:flex; justify-content:flex-end; }
  .icon-btn{
    background:var(--panel);
    border:1px solid var(--border-soft);
    color:var(--text-light);
    width:40px; height:40px;
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,0.15);
    transition:filter 0.15s ease, transform 0.08s ease;
  }
  .icon-btn:hover{ filter:brightness(1.1); }
  .icon-btn:active{ transform:scale(0.92); }
  .icon-btn svg{ width:20px; height:20px; }

  .calc{
    background:linear-gradient(180deg, var(--calc-top) 0%, var(--calc-bottom) 100%);
    border-radius:32px;
    padding:22px 18px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    border:1px solid var(--border-soft);
    transition:background 0.3s ease;
  }
  .display{
    padding:18px 10px 10px;
    text-align:right;
    min-height:104px;
    display:flex; flex-direction:column; justify-content:flex-end; gap:6px;
    word-break:break-all;
  }
  .display .expression{
    font-size:calc(1rem * var(--scale));
    color:var(--display-fade);
    min-height:20px;
    letter-spacing:0.3px;
  }
  .display .current{
    font-size:calc(clamp(2.2rem, 10vw, 3.4rem) * var(--scale));
    font-weight:500;
    line-height:1.1;
    letter-spacing:0.5px;
  }
  .keys{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:12px;
    margin-top:8px;
  }
  button.key{
    border:none; outline:none;
    font-size:calc(1.5rem * var(--scale));
    font-weight:500;
    padding:0;
    aspect-ratio:1/1;
    border-radius:var(--key-radius);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.08s ease, filter 0.15s ease, background 0.15s ease, border-radius 0.2s ease;
    color:var(--text-light);
    background:var(--key-num);
    user-select:none;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
  }
  button.key:active{ transform:scale(0.92); }
  button.key:hover{ filter:brightness(1.15); }
  .key.fn{ background:var(--key-fn); color:var(--text-dark); }
  .key.op{ background:var(--accent); color:var(--accent-contrast); font-weight:600; }
  .key.op.active-op{ background:var(--text-light); color:var(--accent); }
  [data-theme="light"] .key.op.active-op{ background:var(--text-dark); color:var(--accent); }
  .key.zero{
    grid-column:span 2;
    aspect-ratio:auto;
    border-radius:var(--zero-radius);
    justify-content:flex-start;
    padding-left:28px;
  }

  .history-panel{
    background:var(--panel);
    border-radius:24px;
    padding:16px 16px 10px;
    border:1px solid var(--border-soft);
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition:background 0.3s ease;
  }
  .history-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .history-header h2{
    font-size:0.95rem; text-transform:uppercase; letter-spacing:1px;
    color:var(--display-fade); margin:0; font-weight:600;
  }
  .clear-history-btn{
    background:none; border:1px solid var(--border-soft); color:#ff6961;
    font-size:0.8rem; padding:6px 12px; border-radius:14px; cursor:pointer;
    transition:background 0.15s ease;
  }
  .clear-history-btn:hover{ background:rgba(255,105,97,0.12); }
  .history-list{ max-height:260px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
  .history-list::-webkit-scrollbar{ width:6px; }
  .history-list::-webkit-scrollbar-thumb{ background:var(--display-fade); border-radius:10px; opacity:0.4; }
  .history-empty{ color:var(--display-fade); font-size:0.9rem; text-align:center; padding:20px 0 24px; }
  .history-item{ display:flex; flex-direction:column; padding:10px 10px; border-radius:12px; cursor:pointer; transition:background 0.15s ease; }
  .history-item:hover{ background:var(--hist-hover); }
  .history-item .expr{ font-size:0.85rem; color:var(--display-fade); }
  .history-item .res{ font-size:1.15rem; font-weight:600; color:var(--text-light); }
  .history-item .time{ font-size:0.7rem; color:var(--time-color); margin-top:2px; }
  .history-row{ display:flex; justify-content:space-between; align-items:baseline; }

  /* Settings panel */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.2s ease;
    z-index:50; padding:20px;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }
  .settings-panel{
    background:var(--panel);
    color:var(--text-light);
    border-radius:24px;
    padding:22px;
    width:100%;
    max-width:340px;
    border:1px solid var(--border-soft);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    transform:translateY(12px);
    transition:transform 0.2s ease;
  }
  .overlay.open .settings-panel{ transform:translateY(0); }
  .settings-panel h3{ margin:0 0 18px; font-size:1.1rem; }
  .settings-group{ margin-bottom:20px; }
  .settings-group label.group-label{
    display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.8px;
    color:var(--display-fade); margin-bottom:10px; font-weight:600;
  }
  .swatches{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .swatch{
    width:32px; height:32px; border-radius:50%; cursor:pointer;
    border:2px solid transparent; transition:transform 0.1s ease, border-color 0.15s ease;
  }
  .swatch:hover{ transform:scale(1.08); }
  .swatch.selected{ border-color:var(--text-light); }
  .swatch.custom-swatch{
    display:flex; align-items:center; justify-content:center;
    background:conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    position:relative;
    overflow:hidden;
  }
  .swatch.custom-swatch input[type="color"]{
    position:absolute; inset:0; opacity:0; cursor:pointer; border:none; padding:0;
  }
  .segmented{
    display:flex; background:var(--key-fn); border-radius:14px; padding:4px; gap:4px;
  }
  [data-theme="dark"] .segmented{ background:#2c2c2e; }
  .segmented button{
    flex:1; border:none; background:transparent; color:var(--text-light);
    padding:8px 6px; border-radius:10px; font-size:0.85rem; cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease;
  }
  .segmented button.active{ background:var(--accent); color:var(--accent-contrast); font-weight:600; }
  .slider-row{ display:flex; align-items:center; gap:10px; }
  .slider-row span{ font-size:0.85rem; color:var(--display-fade); width:34px; text-align:center; }
  input[type="range"]{
    flex:1; -webkit-appearance:none; height:4px; border-radius:2px;
    background:var(--key-fn); outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:var(--accent); cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.3);
  }
  input[type="range"]::-moz-range-thumb{
    width:20px; height:20px; border-radius:50%; background:var(--accent); border:none; cursor:pointer;
  }
  .settings-close{
    width:100%; padding:12px; border:none; border-radius:14px;
    background:var(--accent); color:var(--accent-contrast); font-weight:600;
    font-size:0.95rem; cursor:pointer; margin-top:6px;
  }
  .settings-close:hover{ filter:brightness(1.08); }

  @media (max-width:360px){
    button.key{ font-size:calc(1.25rem * var(--scale)); }
    .key.zero{ padding-left:22px; }
  }
</style>
</head>
<body data-theme="dark">

<div class="app">
  <div class="top-row">
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="calc">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="keys">
      <button class="key fn" data-action="clear">AC</button>
      <button class="key fn" data-action="negate">+/-</button>
      <button class="key fn" data-action="percent">%</button>
      <button class="key op" data-op="/">÷</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key op" data-op="*">×</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key op" data-op="-">−</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key zero" data-num="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key op" data-action="equals">=</button>
    </div>
  </div>

  <div class="history-panel">
    <div class="history-header">
      <h2>History</h2>
      <button class="clear-history-btn" id="clearHistoryBtn">Clear History</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">No calculations yet</div>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>Personalize</h3>

    <div class="settings-group">
      <label class="group-label">Appearance</label>
      <div class="segmented" id="themeSeg">
        <button data-value="dark" class="active">Dark</button>
        <button data-value="light">Light</button>
      </div>
    </div>

    <div class="settings-group">
      <label class="group-label">Accent Color</label>
      <div class="swatches" id="accentSwatches">
        <div class="swatch selected" data-color="#ff9f0a" style="background:#ff9f0a"></div>
        <div class="swatch" data-color="#0a84ff" style="background:#0a84ff"></div>
        <div class="swatch" data-color="#30d158" style="background:#30d158"></div>
        <div class="swatch" data-color="#ff375f" style="background:#ff375f"></div>
        <div class="swatch" data-color="#bf5af2" style="background:#bf5af2"></div>
        <div class="swatch" data-color="#64d2ff" style="background:#64d2ff"></div>
        <div class="swatch custom-swatch" title="Custom color">
          <input type="color" id="customColorInput" value="#ff9f0a">
        </div>
      </div>
    </div>

    <div class="settings-group">
      <label class="group-label">Button Shape</label>
      <div class="segmented" id="shapeSeg">
        <button data-value="round" class="active">Round</button>
        <button data-value="square">Square</button>
      </div>
    </div>

    <div class="settings-group">
      <label class="group-label">Display Size</label>
      <div class="slider-row">
        <span>S</span>
        <input type="range" id="sizeSlider" min="0.85" max="1.25" step="0.05" value="1">
        <span>L</span>
      </div>
    </div>

    <button class="settings-close" id="closeSettings">Done</button>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'calc_history_v1';
  const SETTINGS_KEY = 'calc_settings_v1';
  const MAX_HISTORY = 50;

  const expressionEl = document.getElementById('expression');
  const currentEl = document.getElementById('current');
  const historyList = document.getElementById('historyList');
  const historyEmpty = document.getElementById('historyEmpty');
  const clearHistoryBtn = document.getElementById('clearHistoryBtn');

  let current = '0';
  let previous = null;
  let operator = null;
  let overwrite = true;
  let expressionLabel = '';

  /* ---------- History ---------- */
  function loadHistory(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveHistory(list){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }catch(e){}
  }
  let history = loadHistory();

  /* ---------- Settings ---------- */
  const defaultSettings = { theme:'dark', accent:'#ff9f0a', shape:'round', scale:1 };
  function loadSettings(){
    try{
      const raw = localStorage.getItem(SETTINGS_KEY);
      return raw ? Object.assign({}, defaultSettings, JSON.parse(raw)) : { ...defaultSettings };
    }catch(e){ return { ...defaultSettings }; }
  }
  function saveSettings(s){
    try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }catch(e){}
  }
  let settings = loadSettings();

  function hexToRgb(hex){
    const m = hex.replace('#','').match(/.{1,2}/g);
    return m.map(x => parseInt(x, 16));
  }
  function pickContrastColor(hex){
    const [r,g,b] = hexToRgb(hex);
    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
    return luminance > 0.6 ? '#241300' : '#ffffff';
  }

  function applySettings(){
    document.body.setAttribute('data-theme', settings.theme);
    document.documentElement.style.setProperty('--accent', settings.accent);
    document.documentElement.style.setProperty('--accent-contrast', pickContrastColor(settings.accent));
    document.documentElement.style.setProperty('--scale', settings.scale);
    if(settings.shape === 'square'){
      document.documentElement.style.setProperty('--key-radius', '20px');
      document.documentElement.style.setProperty('--zero-radius', '20px');
    } else {
      document.documentElement.style.setProperty('--key-radius', '50%');
      document.documentElement.style.setProperty('--zero-radius', '38px');
    }

    // sync UI controls
    document.querySelectorAll('#themeSeg button').forEach(b => b.classList.toggle('active', b.dataset.value === settings.theme));
    document.querySelectorAll('#shapeSeg button').forEach(b => b.classList.toggle('active', b.dataset.value === settings.shape));
    document.querySelectorAll('.swatch[data-color]').forEach(sw => sw.classList.toggle('selected', sw.dataset.color.toLowerCase() === settings.accent.toLowerCase()));
    document.getElementById('sizeSlider').value = settings.scale;
    document.getElementById('customColorInput').value = settings.accent;
  }

  document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('settingsOverlay').classList.add('open');
  });
  document.getElementById('closeSettings').addEventListener('click', closeSettingsPanel);
  document.getElementById('settingsOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'settingsOverlay') closeSettingsPanel();
  });
  function closeSettingsPanel(){
    document.getElementById('settingsOverlay').classList.remove('open');
  }

  document.querySelectorAll('#themeSeg button').forEach(btn => {
    btn.addEventListener('click', () => {
      settings.theme = btn.dataset.value;
      saveSettings(settings);
      applySettings();
    });
  });
  document.querySelectorAll('#shapeSeg button').forEach(btn => {
    btn.addEventListener('click', () => {
      settings.shape = btn.dataset.value;
      saveSettings(settings);
      applySettings();
    });
  });
  document.querySelectorAll('.swatch[data-color]').forEach(sw => {
    sw.addEventListener('click', () => {
      settings.accent = sw.dataset.color;
      saveSettings(settings);
      applySettings();
    });
  });
  document.getElementById('customColorInput').addEventListener('input', (e) => {
    settings.accent = e.target.value;
    saveSettings(settings);
    applySettings();
  });
  document.getElementById('sizeSlider').addEventListener('input', (e) => {
    settings.scale = parseFloat(e.target.value);
    saveSettings(settings);
    applySettings();
  });

  applySettings();

  /* ---------- Calculator logic ---------- */
  function formatNumber(numStr){
    if(numStr === 'Error') return numStr;
    const num = parseFloat(numStr);
    if(Number.isNaN(num)) return '0';
    if(Math.abs(num) >= 1e15 || (Math.abs(num) < 1e-9 && num !== 0)){
      return num.toExponential(6);
    }
    const parts = numStr.split('.');
    const intPart = parts[0].replace(/^-/, '');
    const sign = numStr.startsWith('-') ? '-' : '';
    const withCommas = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return sign + withCommas + (parts[1] !== undefined ? '.' + parts[1] : '');
  }

  function updateDisplay(){
    currentEl.textContent = formatNumber(current);
    expressionEl.textContent = expressionLabel;
  }

  function opSymbol(op){
    return { '+':'+', '-':'−', '*':'×', '/':'÷' }[op] || op;
  }

  function clearHighlightOps(){
    document.querySelectorAll('.key.op').forEach(b => b.classList.remove('active-op'));
  }
  function highlightOp(op){
    clearHighlightOps();
    if(!op) return;
    const btn = document.querySelector(`.key.op[data-op="${op}"]`);
    if(btn) btn.classList.add('active-op');
  }

  function inputDigit(d){
    if(overwrite){
      current = d === '.' ? '0.' : d;
      overwrite = false;
    } else {
      if(d === '.' && current.includes('.')) return;
      if(current === '0' && d !== '.'){
        current = d;
      } else {
        current += d;
      }
    }
    updateDisplay();
  }

  function compute(a, b, op){
    a = parseFloat(a); b = parseFloat(b);
    switch(op){
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? NaN : a / b;
      default: return b;
    }
  }
  function roundResult(n){
    if(!isFinite(n)) return n;
    return Math.round((n + Number.EPSILON) * 1e10) / 1e10;
  }

  function chooseOperator(op){
    if(operator && !overwrite){
      const result = roundResult(compute(previous, current, operator));
      current = Number.isNaN(result) ? 'Error' : String(result);
      previous = current;
    } else {
      previous = current;
    }
    operator = op;
    overwrite = true;
    expressionLabel = `${formatNumber(previous)} ${opSymbol(op)}`;
    highlightOp(op);
    updateDisplay();
  }

  function equals(){
    if(operator === null || previous === null) return;
    const a = previous, b = current, op = operator;
    const result = roundResult(compute(a, b, op));
    const resultStr = Number.isNaN(result) ? 'Error' : String(result);
    const exprText = `${formatNumber(a)} ${opSymbol(op)} ${formatNumber(b)}`;

    if(resultStr !== 'Error'){
      addHistory(exprText, formatNumber(resultStr));
    }

    current = resultStr;
    expressionLabel = exprText + ' =';
    previous = null;
    operator = null;
    overwrite = true;
    clearHighlightOps();
    updateDisplay();
  }

  function clearAll(){
    current = '0';
    previous = null;
    operator = null;
    overwrite = true;
    expressionLabel = '';
    clearHighlightOps();
    updateDisplay();
  }

  function backspace(){
    if(overwrite) return;
    if(current.length <= 1 || (current.length === 2 && current.startsWith('-'))){
      current = '0';
      overwrite = true;
    } else {
      current = current.slice(0, -1);
    }
    updateDisplay();
  }

  function negate(){
    if(current === '0') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent(){
    const num = parseFloat(current);
    if(Number.isNaN(num)) return;
    current = String(roundResult(num / 100));
    overwrite = false;
    updateDisplay();
  }

  function addHistory(expr, result){
    const entry = { expr, result, time: new Date().toISOString() };
    history.unshift(entry);
    if(history.length > MAX_HISTORY){
      history = history.slice(0, MAX_HISTORY);
    }
    saveHistory(history);
    renderHistory();
  }

  function formatTimestamp(iso){
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const timeStr = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(sameDay) return timeStr;
    const dateStr = d.toLocaleDateString([], {month:'short', day:'numeric'});
    return `${dateStr}, ${timeStr}`;
  }

  function renderHistory(){
    historyList.querySelectorAll('.history-item').forEach(el => el.remove());
    if(history.length === 0){
      historyEmpty.style.display = 'block';
      return;
    }
    historyEmpty.style.display = 'none';
    history.forEach((entry) => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-row">
          <span class="expr">${entry.expr} =</span>
          <span class="time">${formatTimestamp(entry.time)}</span>
        </div>
        <span class="res">${entry.result}</span>
      `;
      item.addEventListener('click', () => {
        current = entry.result.replace(/,/g, '');
        overwrite = false;
        previous = null;
        operator = null;
        expressionLabel = `${entry.expr} =`;
        clearHighlightOps();
        updateDisplay();
      });
      historyList.appendChild(item);
    });
  }

  clearHistoryBtn.addEventListener('click', () => {
    if(history.length === 0) return;
    if(confirm('Clear all calculation history? This cannot be undone.')){
      history = [];
      saveHistory(history);
      renderHistory();
    }
  });

  document.querySelectorAll('[data-num]').forEach(btn => {
    btn.addEventListener('click', () => inputDigit(btn.getAttribute('data-num')));
  });
  document.querySelectorAll('[data-op]').forEach(btn => {
    btn.addEventListener('click', () => chooseOperator(btn.getAttribute('data-op')));
  });
  document.querySelector('[data-action="decimal"]').addEventListener('click', () => inputDigit('.'));
  document.querySelector('[data-action="clear"]').addEventListener('click', clearAll);
  document.querySelector('[data-action="negate"]').addEventListener('click', negate);
  document.querySelector('[data-action="percent"]').addEventListener('click', percent);
  document.querySelector('[data-action="equals"]').addEventListener('click', equals);

  window.addEventListener('keydown', (e) => {
    if(e.key >= '0' && e.key <= '9'){ inputDigit(e.key); return; }
    if(e.key === '.'){ inputDigit('.'); return; }
    if(['+','-','*','/'].includes(e.key)){ chooseOperator(e.key); return; }
    if(e.key === 'Enter' || e.key === '='){ e.preventDefault(); equals(); return; }
    if(e.key === 'Backspace'){ backspace(); return; }
    if(e.key === 'Escape'){ clearAll(); return; }
    if(e.key === '%'){ percent(); return; }
  });

  renderHistory();
  updateDisplay();
})();
</script>

</body>
</html>
